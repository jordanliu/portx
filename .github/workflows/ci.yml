name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Go version
        run: go version

      - name: Test
        run: go test -count=1 ./...

      - name: Race test
        if: runner.os != 'Windows'
        run: go test -race -count=1 ./...

      - name: Build
        run: make build

      - name: Smoke
        shell: bash
        run: |
          ./bin/portx version
          ./bin/portx help >/dev/null

  quality:
    name: Quality and security
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Module verification
        run: go mod verify

      - name: Formatting
        run: make format-check

      - name: Workflow lint
        run: make workflow-check

      - name: Vet
        run: make vet

      - name: Static analysis
        run: make staticcheck

      - name: Vulnerability scan
        run: make vulncheck
